<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Jusmin Kate Portfolio</title>

  <!-- GOOGLE FONTS -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- CSS -->

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- BACKGROUND -->

  <div class="bg">
    <div class="grid"></div>
  </div>

  <!-- CYBER STRIPS -->

  <div class="strip strip1">
    <span>PASTEL CYBERPUNK</span>
    <span>DREAMCORE</span>
    <span>IDENTITY</span>
    <span>CUTESY STYLE</span>
  </div>

  <div class="strip strip2">
    <span>SOFT GLITCH</span>
    <span>PIXELS ARE POETRY</span>
    <span>NEON SOUL</span>
    <span>PINK CORE</span>
  </div>

  <!-- HERO -->

  <section class="hero">

    <!-- LEFT TEXT -->

    <div class="side-text">

      <h1>
        Jusmin<br>
        <span>Kate</span>
      </h1>

      <p>Portfolio</p>

      <a href="landing.html" class="home-btn">
        Enter Portfolio
      </a>

    </div>

    <!-- IMAGE REVEAL -->

    <div class="image-wrap" id="wrap">

      <!-- FORMAL IMAGE -->

      <img
        class="real"
        src="images/formal.png"
        alt="Formal Portrait"
      >

      <!-- CYBER IMAGE -->

      <img
        class="cyber"
        src="images/cyberpunk.png"
        alt="Cyberpunk Portrait"
      >

      <!-- CURSOR GLOW -->

      <div class="cursor-glow"></div>

    </div>

  </section>

  <!-- NOISE -->

  <div class="noise"></div>

  <!-- JAVASCRIPT -->

  <script src="script.js"></script>

</body>
</html>
